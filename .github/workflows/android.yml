name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Initialize and Configure Buildozer Spec
        run: |
          pip install buildozer
          buildozer init
          # Internet-Berechtigungen aktivieren
          sed -i 's/#android.permissions = .*/android.permissions = INTERNET, ACCESS_NETWORK_STATE/' buildozer.spec
          # Anforderungen für Kivy und Requests setzen
          sed -i 's/requirements = python3, kivy/requirements = python3, kivy, requests, urllib3, chardet, idna, certifi/' buildozer.spec
          # App-Namen anpassen
          sed -i 's/title = My Application/title = Shield Titan Sync/' buildozer.spec
          sed -i 's/package.name = myapp/package.name = shieldsync/' buildozer.spec

      - name: Build APK with Buildozer Action
        uses: ArtemGovorov/buildozer-action@v1
        with:
          command: buildozer android debug
          repository_root: .

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ShieldTitanAPK
          path: bin/*.apk
