name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y openjdk-17-jdk build-essential libsqlite3-dev gawk unzip zip libffi-dev

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install buildozer kivy requests

      - name: Initialize and Configure Buildozer
        run: |
          # 1. Standard-Spec generieren
          buildozer init
          
          # 2. Internet-Berechtigungen aktivieren
          sed -i 's/#android.permissions = .*/android.permissions = INTERNET, ACCESS_NETWORK_STATE/' buildozer.spec
          
          # 3. Anforderungen für Kivy und Requests setzen
          sed -i 's/requirements = python3, kivy/requirements = python3, kivy, requests, urllib3, chardet, idna, certifi/' buildozer.spec
          
          # 4. App-Namen anpassen
          sed -i 's/title = My Application/title = Shield Titan Sync/' buildozer.spec
          sed -i 's/package.name = myapp/package.name = shieldsync/' buildozer.spec

      - name: Build APK with Buildozer
        run: buildozer android debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ShieldTitanAPK
          path: bin/*.apk
